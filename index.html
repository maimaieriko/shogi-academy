<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>将棋アドベンチャーアカデミー</title>
  <meta name="description" content="ふしぎなおもちゃの学園を将棋の力でよみがえらせる、子ども向け将棋学習アドベンチャーゲーム">

  <!-- PWA風 / iOS ホーム画面対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="将棋アカデミー">
  <meta name="theme-color" content="#241B3A">
  <meta name="format-detection" content="telephone=no">

  <!-- アイコン（外部ファイル不要のインラインSVG） -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,4 88,22 79,96 21,96 12,22' fill='%23FBF1DC' stroke='%234A2E17' stroke-width='6'/%3E%3Ctext x='50' y='70' font-size='44' text-anchor='middle' font-weight='bold' fill='%232A1E12'%3E王%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23241B3A'/%3E%3Cpolygon points='50,10 84,26 76,92 24,92 16,26' fill='%23FBF1DC' stroke='%234A2E17' stroke-width='5'/%3E%3Ctext x='50' y='68' font-size='38' text-anchor='middle' font-weight='bold' fill='%232A1E12'%3E王%3C/text%3E%3C/svg%3E">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- ===== 画面（中身は main.js が描画） ===== -->
    <section id="scr-title"></section>
    <section id="scr-home" class="hidden"></section>
    <section id="scr-training" class="hidden"></section>
    <section id="scr-area" class="hidden"></section>

    <!-- プレイ画面（パズル・ボス戦・AI対局 共通） -->
    <section id="scr-play" class="hidden">
      <div class="play-top">
        <button type="button" class="btn btn-ghost" id="btn-quit">← <span class="pl-quit">やめる</span></button>
        <div id="play-prompt"></div>
        <button type="button" class="btn btn-ghost" id="btn-hint">💡 ヒント</button>
      </div>
      <div id="play-sub"></div>
      <div id="board-holder"></div>
      <div class="play-actions">
        <button type="button" class="btn btn-danger hidden" id="btn-resign">🏳️ 投了する</button>
      </div>
      <div id="play-msg"></div>
    </section>

    <section id="scr-collection" class="hidden"></section>
    <section id="scr-stats" class="hidden"></section>
    <section id="scr-settings" class="hidden"></section>

  </div>

  <!-- ===== 下部ナビゲーション ===== -->
  <nav id="nav" class="hidden">
    <button type="button" class="nav-btn" data-go="home"><span class="nv-i">🏫</span>ホーム</button>
    <button type="button" class="nav-btn" data-go="training"><span class="nv-i">🧩</span>とっくん</button>
    <button type="button" class="nav-btn" data-go="collection"><span class="nv-i">📔</span>コレクション</button>
    <button type="button" class="nav-btn" data-go="stats"><span class="nv-i">📊</span>せいせき</button>
    <button type="button" class="nav-btn" data-go="settings"><span class="nv-i">⚙️</span>せってい</button>
  </nav>

  <!-- ===== オーバーレイ ===== -->
  <div id="dialogue" class="hidden"></div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <canvas id="fx-canvas"></canvas>

  <noscript>
    <div style="padding:24px; text-align:center; color:#FBF1DC; font-weight:bold;">
      このゲームを遊ぶには JavaScript を有効にしてください。<br>
      Please enable JavaScript to play.
    </div>
  </noscript>

  <!-- ===== スクリプト（依存順） =====
       i18n → save → audio → effects → rules → ai → puzzles → world → board → main -->
  <script src="js/i18n.js" defer></script>
  <script src="js/save.js" defer></script>
  <script src="js/audio.js" defer></script>
  <script src="js/effects.js" defer></script>
  <script src="js/rules.js" defer></script>
  <script src="js/ai.js" defer></script>
  <script src="js/puzzles.js" defer></script>
  <script src="js/world.js" defer></script>
  <script src="js/board.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
